name: Deploy AI Study Archive

on:
  push:
    branches: [main]
    paths:
      - "examples/ai-study-archive/**"
      - ".github/workflows/deploy-ai-study-archive.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/ai-study-archive/package-lock.json

      - name: Install
        working-directory: examples/ai-study-archive
        run: npm ci

      - name: Build (GitHub Pages base path)
        working-directory: examples/ai-study-archive
        run: GH_PAGES=1 npm run build

      - name: Assemble Pages artifact (ai-study-archive/ サブパスを維持)
        run: |
          mkdir -p _site/ai-study-archive
          cp -r examples/ai-study-archive/dist/. _site/ai-study-archive/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
