name: Deploy AI Study Archive

on:
  push:
    branches: [main]
    paths:
      - "examples/ai-study-archive/**"
      - ".github/workflows/deploy-ai-study-archive.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/ai-study-archive/package-lock.json

      - name: Install
        working-directory: examples/ai-study-archive
        run: npm ci

      - name: Build (GitHub Pages base path)
        working-directory: examples/ai-study-archive
        run: GH_PAGES=1 npm run build

      - name: Deploy to gh-pages (ai-study-archive/ サブディレクトリのみ更新)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: examples/ai-study-archive/dist
          destination_dir: ai-study-archive
          keep_files: true
