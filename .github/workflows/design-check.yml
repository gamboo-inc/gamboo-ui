name: Design System Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Design Check (Schema + Rules + Contracts)
        run: npm run design:check

      - name: Lint Generated UI (変更された .html/.tsx/.jsx/.vue を禁止パターン検査)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          else
            BASE="${{ github.event.before }}"
          fi
          FILES=$(git diff --name-only --diff-filter=d "$BASE" HEAD | grep -E '\.(html|tsx|jsx|vue)$' || true)
          if [ -z "$FILES" ]; then
            echo "✅ 変更された UI 生成物なし。スキップ"
            exit 0
          fi
          echo "対象ファイル:"; echo "$FILES"
          echo "$FILES" | xargs npm run design:lint-generated --

      - name: Drift Check (Docs ↔ Contracts 整合性)
        run: npm run design:drift

      - name: Token Validation (tokens.json ↔ ds-config.js / ds-theme.css)
        run: npm run validate

      - name: TypeScript Build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright + axe Tests
        run: npm test
